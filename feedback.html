<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback — APSON Bauchi 2026</title>
<meta name="theme-color" content="#1c7a3c">
<style>
  :root{--brand:#1c7a3c;--brand-2:#27994e;--gold:#f4b400}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#f5faf6;display:flex;flex-direction:column;min-height:100vh}
  header{background:linear-gradient(140deg,var(--brand),var(--brand-2));color:#fff;padding:16px;text-align:center}
  header h1{font-size:1.05rem}
  header p{font-size:.78rem;opacity:.88;margin-top:2px}
  header .cert{display:inline-block;margin-top:8px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.35);border-radius:999px;padding:4px 14px;font-size:.72rem;font-weight:700}
  header .cert b{color:var(--gold)}
  .frame{flex:1;display:flex}
  iframe{flex:1;width:100%;border:none;min-height:70vh}
  footer{text-align:center;font-size:.72rem;color:#8aa892;padding:8px;background:#fff;border-top:1px solid #e2ece4}
  footer a{color:var(--brand);font-weight:700;text-decoration:none}
  .back{position:fixed;top:10px;left:10px;background:rgba(0,0,0,.25);color:#fff;border-radius:999px;padding:5px 13px;font-size:.75rem;font-weight:700;text-decoration:none}
</style>
</head>
<body>
<a class="back" href="./">‹ App</a>
<header>
  <h1>APSON Bauchi 2026 — Conference Feedback</h1>
  <p>25th Annual General Meeting &amp; Scientific Conference</p>
  <span class="cert">📜 Your <b>certificate of attendance</b> is emailed automatically after you submit</span>
</header>
<div class="frame">
  <!-- Replace FORM_ID below with your Google Form's ID, keeping ?embedded=true -->
  <iframe src="https://docs.google.com/forms/d/e/FORM_ID/viewform?embedded=true" title="Feedback form" loading="lazy">Loading…</iframe>
</div>
<footer>Event app by <a href="https://confhub.ng" target="_blank" rel="noopener">ConfHub.ng</a></footer>
</body>
</html>
